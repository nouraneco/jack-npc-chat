<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JACKとの会話</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app">
    <header class="profile">
      <div class="portrait" aria-hidden="true">J</div>
      <div>
        <p class="eyebrow">FOG HARBOR / NPC CONVERSATION</p>
        <h1 id="npc-name">JACK</h1>
        <p id="npc-role">港町の酒場「錨亭」の店主</p>
      </div>
      <div class="header-actions">
        <a class="ghost setup-link" href="/setup">公開の準備</a>
        <button id="reset" class="ghost" type="button">会話を最初から</button>
      </div>
    </header>

    <section class="status" aria-label="会話状態">
      <span>卓ID <strong id="session-id">—</strong></span>
      <span>信頼 <strong id="trust">—</strong></span>
      <span>警戒 <strong id="alert">—</strong></span>
      <span>恐怖 <strong id="fear">—</strong></span>
      <span id="mode" class="mode">確認中</span>
    </section>

    <section id="messages" class="messages" aria-live="polite"></section>

    <form id="chat-form" class="composer">
      <label for="message" class="sr-only">JACKへの発言</label>
      <textarea id="message" rows="2" maxlength="1000" placeholder="JACKに話しかける…" required></textarea>
      <button id="send" type="submit">送信</button>
    </form>
    <p class="hint">Enterで送信・Shift+Enterで改行</p>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
