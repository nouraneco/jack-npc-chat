<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JACKをインターネットに公開する</title>
  <link rel="stylesheet" href="/setup.css">
</head>
<body>
  <main class="wizard-shell">
    <header class="topbar">
      <a href="/chat/jack?session=table-001" class="back">← JACKとの会話へ戻る</a>
      <span>公開おたすけガイド</span>
    </header>

    <section class="intro" id="intro">
      <p class="eyebrow">かんたん設定</p>
      <h1>質問に答えて、JACKを公開しましょう</h1>
      <p>難しい設定を覚える必要はありません。現在の状況を一つずつ選ぶと、あなた専用の手順を作ります。</p>
      <button id="start" class="primary" type="button">はじめる</button>
    </section>

    <section class="wizard hidden" id="wizard" aria-live="polite">
      <div class="progress-row">
        <span id="step-label">質問 1 / 5</span>
        <div class="progress"><span id="progress-bar"></span></div>
      </div>
      <div class="question-card">
        <div class="question-icon" id="question-icon">1</div>
        <p class="small">まず、現在の状況を教えてください</p>
        <h2 id="question"></h2>
        <p id="question-help" class="help"></p>
        <div id="choices" class="choices"></div>
        <button id="previous" class="text-button" type="button">← 前の質問へ</button>
      </div>
    </section>

    <section class="result hidden" id="result">
      <div class="result-heading">
        <span class="complete-mark">✓</span>
        <div>
          <p class="eyebrow">あなた専用の公開手順</p>
          <h2 id="result-title">準備するものが分かりました</h2>
        </div>
      </div>
      <div id="summary" class="summary"></div>
      <ol id="action-list" class="action-list"></ol>
      <div class="finish-note">
        <strong>途中で分からなくなったら</strong>
        <p>この画面を開いたまま、Codexに「今この手順で止まりました」と伝えてください。続きから案内できます。</p>
      </div>
      <div class="result-actions">
        <button id="restart" class="secondary" type="button">回答をやり直す</button>
        <button id="copy" class="primary" type="button">手順をコピー</button>
      </div>
    </section>
  </main>
  <script type="module" src="/setup.js"></script>
</body>
</html>
